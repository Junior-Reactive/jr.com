<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── FAVICON & ICONS ───────────────────────────────────────── -->
    <link rel="icon"             href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon"             href="%PUBLIC_URL%/logo192.png" sizes="192x192" type="image/png" />
    <link rel="icon"             href="%PUBLIC_URL%/logo512.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo512.png" />

    <!-- ── VIEWPORT & THEME ──────────────────────────────────────── -->
    <meta name="viewport"    content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1c265e" />

    <!-- ── SEO META ──────────────────────────────────────────────── -->
    <meta name="description"
          content="Junior Reactive — AI & IT Solutions. Empowering businesses across East Africa with intelligent automation, AI consulting, custom software, and data analytics." />

    <!-- ── OPEN GRAPH (social sharing previews) ──────────────────── -->
    <!-- Uses the 3840×2160 logo.png — social platforms crop/resize this automatically -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Junior Reactive" />
    <meta property="og:title"       content="Junior Reactive — AI & IT Solutions" />
    <meta property="og:description" content="Empowering businesses across East Africa with intelligent automation, AI consulting, custom software, and data analytics." />
    <meta property="og:image"       content="%PUBLIC_URL%/logo.png" />
    <meta property="og:image:width"  content="3840" />
    <meta property="og:image:height" content="2160" />

    <!-- ── TWITTER CARD ──────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Junior Reactive — AI & IT Solutions" />
    <meta name="twitter:description" content="Empowering businesses across East Africa with intelligent automation and AI consulting." />
    <meta name="twitter:image"       content="%PUBLIC_URL%/logo.png" />

    <!-- ── PWA MANIFEST ──────────────────────────────────────────── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── FONTS ─────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- ── FONT AWESOME ───────────────────────────────────────────── -->
