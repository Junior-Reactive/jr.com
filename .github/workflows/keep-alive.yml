name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 5 minutes — keeps the free Render instance warm
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://jr-backend-1edu.onrender.com/api/health)

          echo "Response status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️  Backend returned HTTP $STATUS — may be cold-starting"
            # Don't fail the workflow — a slow cold start is expected occasionally
            exit 0
          fi
