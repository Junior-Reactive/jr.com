name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 5 minutes — keeps the free Render instance warm
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health endpoint
        run: |
          # Simple health check (doesn't require database)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 5 \
            --max-time 30 \
            https://jr-backend-1edu.onrender.com/api/health)

          echo "Response status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive and responding"
            exit 0
          else
            echo "⚠️  Backend returned HTTP $STATUS — attempting detailed health check"

            # Detailed check (with database) - if this fails, still exit 0 for cold starts
            DETAILED_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 30 \
              https://jr-backend-1edu.onrender.com/api/health/detailed)

            echo "Detailed status: $DETAILED_STATUS"
            exit 0
          fi
